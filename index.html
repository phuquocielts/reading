<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoPoDoo English &amp; IELTS — Kho bài học</title>
<style>
  :root{
    --navy-deep:#081633;
    --navy:#0d2149;
    --navy-card:#12294f;
    --navy-line:#24406e;
    --gold:#d4af37;
    --gold-bright:#f0c75e;
    --ink:#eaf0fa;
    --ink-dim:#9db0cf;
    --fs:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{font-size:var(--fs);}
  body{
    background:var(--navy-deep);
    background-image:radial-gradient(ellipse at 50% -10%, #16305e 0%, var(--navy-deep) 60%);
    color:var(--ink);
    font-family:"Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:820px;margin:0 auto;padding:24px 16px 64px;}

  /* ===== Header ===== */
  header{text-align:center;padding:18px 0 26px;border-bottom:1px solid var(--navy-line);}
  .brand-eyebrow{
    font-size:.72rem;letter-spacing:.35em;text-transform:uppercase;
    color:var(--gold);margin-bottom:10px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-size:1.9rem;font-weight:normal;letter-spacing:.02em;
  }
  h1 b{color:var(--gold-bright);font-weight:normal;}
  .brand-sub{color:var(--ink-dim);font-size:.85rem;margin-top:8px;}
  .brand-sub a{color:var(--ink-dim);text-decoration:none;}

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex;gap:10px;align-items:center;margin:22px 0 6px;flex-wrap:wrap;
  }
  .search{
    flex:1;min-width:200px;position:relative;
  }
  .search input{
    width:100%;padding:11px 14px 11px 38px;border-radius:10px;
    border:1px solid var(--navy-line);background:var(--navy-card);
    color:var(--ink);font-size:.95rem;outline:none;
  }
  .search input:focus{border-color:var(--gold);}
  .search::before{
    content:"⌕";position:absolute;left:13px;top:50%;transform:translateY(-56%);
    color:var(--gold);font-size:1.2rem;
  }
  .fontbtns{display:flex;gap:6px;}
  .fontbtns button{
    width:38px;height:38px;border-radius:9px;border:1px solid var(--navy-line);
    background:var(--navy-card);color:var(--gold-bright);font-size:.95rem;cursor:pointer;
  }
  .fontbtns button:hover{border-color:var(--gold);}

  /* ===== Tree ===== */
  .repo{margin-top:26px;}
  .repo-head{
    display:flex;align-items:center;gap:12px;cursor:pointer;
    padding:14px 16px;border:1px solid var(--navy-line);border-radius:12px;
    background:linear-gradient(180deg,#16305e 0%, var(--navy-card) 100%);
    user-select:none;
  }
  .repo-head:hover{border-color:var(--gold);}
  .repo-head .chev{
    color:var(--gold);transition:transform .2s;font-size:.85rem;width:14px;
  }
  .repo.open .repo-head .chev{transform:rotate(90deg);}
  .repo-title{
    font-family:Georgia,"Times New Roman",serif;font-size:1.15rem;color:var(--gold-bright);
  }
  .repo-count{
    margin-left:auto;font-size:.78rem;color:var(--ink-dim);
    border:1px solid var(--navy-line);padding:3px 10px;border-radius:99px;white-space:nowrap;
  }
  .repo-body{display:none;padding:6px 0 2px 12px;}
  .repo.open .repo-body{display:block;}

  ul.tree{list-style:none;margin-left:10px;border-left:1px dashed var(--navy-line);}
  ul.tree li{position:relative;padding:0 0 0 22px;}
  ul.tree li::before{
    content:"";position:absolute;left:0;top:1.15em;width:16px;height:1px;
    background:var(--navy-line);
  }
  .folder-label{
    display:flex;align-items:center;gap:8px;padding:9px 6px;cursor:pointer;
    color:var(--gold-bright);user-select:none;font-size:.98rem;
  }
  .folder-label .chev{color:var(--gold);font-size:.75rem;transition:transform .2s;width:12px;}
  li.folder.open > .folder-label .chev{transform:rotate(90deg);}
  li.folder > ul{display:none;}
  li.folder.open > ul{display:block;}

  a.lesson{
    display:flex;align-items:center;gap:9px;padding:9px 6px;
    color:var(--ink);text-decoration:none;border-radius:8px;font-size:.98rem;
  }
  a.lesson:hover{background:rgba(212,175,55,.09);color:var(--gold-bright);}
  a.lesson .dot{color:var(--gold);font-size:.7rem;}

  .note{color:var(--ink-dim);font-size:.85rem;padding:12px 6px;}
  .error-box{
    margin-top:14px;padding:14px 16px;border:1px solid #6e4a24;border-radius:10px;
    background:#2a1e10;color:#f0d9a8;font-size:.9rem;line-height:1.55;
  }
  .error-box a{color:var(--gold-bright);}

  footer{
    margin-top:52px;padding-top:18px;border-top:1px solid var(--navy-line);
    text-align:center;color:var(--ink-dim);font-size:.8rem;line-height:1.7;
  }
  .hidden{display:none !important;}

  @media (max-width:480px){
    h1{font-size:1.5rem;}
    .wrap{padding:16px 12px 48px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand-eyebrow">PoPoDoo English &amp; IELTS</div>
    <h1>Kho bài học <b>N.D.N</b></h1>
    <div class="brand-sub">Thầy Andy — Nguyễn Duy Nhất · <a href="tel:0932067877">0932 067 877</a></div>
  </header>

  <div class="toolbar">
    <div class="search">
      <input id="q" type="text" placeholder="Tìm bài học..." aria-label="Tìm bài học">
    </div>
    <div class="fontbtns">
      <button id="fminus" title="Giảm cỡ chữ" aria-label="Giảm cỡ chữ">A−</button>
      <button id="fplus" title="Tăng cỡ chữ" aria-label="Tăng cỡ chữ">A+</button>
    </div>
  </div>

  <div id="repos"></div>
  <div id="status" class="note">Đang tải danh sách bài học…</div>

  <footer>
    Trang tự cập nhật theo kho bài trên GitHub — thêm bài mới là tự hiện, không cần sửa trang.<br>
    © PoPoDoo English &amp; IELTS
  </footer>
</div>

<script>
/* ================= CẤU HÌNH =================
   Thêm kho mới: thêm 1 dòng vào danh sách này. */
const REPOS = [
  { repo: "ielts-lessons", label: "Luyện thi IELTS" },
  { repo: "highschool",    label: "Tiếng Anh phổ thông" },
  { repo: "reading",       label: "Luyện đọc — Reading" },
];
const USER = "phuquocielts";
/* ============================================ */

const CACHE_KEY = "popodoo_home_v1";
const CACHE_MIN = 10; // phút

const $repos = document.getElementById("repos");
const $status = document.getElementById("status");

/* ---- Cỡ chữ A− / A+ ---- */
let fs = parseInt(localStorage.getItem("popodoo_home_fs_v1") || "16", 10);
applyFs();
document.getElementById("fplus").onclick = () => { fs = Math.min(fs + 1, 22); applyFs(); };
document.getElementById("fminus").onclick = () => { fs = Math.max(fs - 1, 13); applyFs(); };
function applyFs(){
  document.documentElement.style.setProperty("--fs", fs + "px");
  localStorage.setItem("popodoo_home_fs_v1", String(fs));
}

/* ---- Tên hiển thị đẹp từ tên file ---- */
function prettyName(name){
  let s = name.replace(/\.html?$/i, "").replace(/[-_]+/g, " ").trim();
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/* ---- Gọi GitHub API, đọc đệ quy 1 cấp thư mục ---- */
async function fetchDir(repo, path){
  const url = `https://api.github.com/repos/${USER}/${repo}/contents/${path}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(res.status === 403 ? "rate" : "http " + res.status);
  return res.json();
}

async function loadRepo(cfg){
  const root = await fetchDir(cfg.repo, "");
  const tree = { folders: [], files: [] };
  for(const item of root){
    if(item.type === "file" && /\.html?$/i.test(item.name) && item.name.toLowerCase() !== "index.html"){
      tree.files.push(item.name);
    }else if(item.type === "dir"){
      try{
        const sub = await fetchDir(cfg.repo, item.path);
        const files = sub.filter(f => f.type === "file" && /\.html?$/i.test(f.name) && f.name.toLowerCase() !== "index.html")
                         .map(f => f.name);
        if(files.length) tree.folders.push({ name: item.name, files });
      }catch(e){ /* bỏ qua thư mục lỗi */ }
    }
  }
  return tree;
}

function lessonUrl(repo, folder, file){
  const base = `https://${USER}.github.io/${repo}/`;
  return base + (folder ? encodeURIComponent(folder) + "/" : "") + encodeURIComponent(file);
}

/* ---- Vẽ giao diện ---- */
function render(data){
  $repos.innerHTML = "";
  let total = 0;
  data.forEach((entry, i) => {
    const { cfg, tree } = entry;
    const count = tree.files.length + tree.folders.reduce((n,f)=>n+f.files.length,0);
    total += count;

    const sec = document.createElement("section");
    sec.className = "repo" + (i === 0 ? " open" : "");
    sec.innerHTML = `
      <div class="repo-head" role="button" tabindex="0" aria-expanded="${i===0}">
        <span class="chev">▶</span>
        <span class="repo-title">${cfg.label}</span>
        <span class="repo-count">${count} bài</span>
      </div>
      <div class="repo-body"></div>`;
    const body = sec.querySelector(".repo-body");
    const ul = document.createElement("ul");
    ul.className = "tree";

    tree.folders.forEach(fd => {
      const li = document.createElement("li");
      li.className = "folder open";
      li.innerHTML = `<div class="folder-label"><span class="chev">▶</span>📂 ${prettyName(fd.name)}</div>`;
      const sub = document.createElement("ul");
      sub.className = "tree";
      fd.files.forEach(f => sub.appendChild(fileLi(cfg.repo, fd.name, f)));
      li.appendChild(sub);
      li.querySelector(".folder-label").onclick = () => li.classList.toggle("open");
      ul.appendChild(li);
    });
    tree.files.forEach(f => ul.appendChild(fileLi(cfg.repo, null, f)));

    if(count === 0){
      body.innerHTML = `<div class="note">Chưa có bài học nào trong kho này.</div>`;
    }else{
      body.appendChild(ul);
    }

    const head = sec.querySelector(".repo-head");
    const toggle = () => {
      sec.classList.toggle("open");
      head.setAttribute("aria-expanded", sec.classList.contains("open"));
    };
    head.onclick = toggle;
    head.onkeydown = e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); toggle(); } };

    $repos.appendChild(sec);
  });
  $status.textContent = total ? "" : "Chưa có bài học nào.";
  if(total) $status.classList.add("hidden");
}

function fileLi(repo, folder, file){
  const li = document.createElement("li");
  const a = document.createElement("a");
  a.className = "lesson";
  a.href = lessonUrl(repo, folder, file);
  a.innerHTML = `<span class="dot">◆</span><span class="lname">${prettyName(file)}</span>`;
  a.dataset.q = prettyName(file).toLowerCase();
  li.appendChild(a);
  return li;
}

/* ---- Tìm kiếm ---- */
document.getElementById("q").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll("a.lesson").forEach(a => {
    a.parentElement.classList.toggle("hidden", q && !a.dataset.q.includes(q));
  });
  document.querySelectorAll(".repo").forEach(sec => {
    if(q) sec.classList.add("open");
  });
});

/* ---- Khởi động: cache trước, API sau ---- */
(async function init(){
  try{
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
    if(cached && Date.now() - cached.t < CACHE_MIN * 60000){
      render(cached.data);
    }
    const data = [];
    for(const cfg of REPOS){
      data.push({ cfg, tree: await loadRepo(cfg) });
    }
    render(data);
    localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), data }));
  }catch(err){
    if($repos.children.length) return; // đã render từ cache thì thôi
    $status.innerHTML = "";
    const box = document.createElement("div");
    box.className = "error-box";
    box.innerHTML = err.message === "rate"
      ? "GitHub tạm giới hạn số lần tải danh sách (thử lại sau vài phút). Trong lúc chờ, vào thẳng kho bài: " +
        REPOS.map(c => `<a href="https://${USER}.github.io/${c.repo}/">${c.label}</a>`).join(" · ")
      : "Không tải được danh sách bài học. Kiểm tra kết nối mạng rồi tải lại trang.<br>Vào thẳng kho bài: " +
        REPOS.map(c => `<a href="https://${USER}.github.io/${c.repo}/">${c.label}</a>`).join(" · ");
    $repos.appendChild(box);
  }
})();
</script>
</body>
</html>
